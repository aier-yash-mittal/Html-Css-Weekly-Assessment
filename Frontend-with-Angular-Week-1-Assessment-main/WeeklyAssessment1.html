<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visionary</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f5f7fb;
  line-height: 1.5;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: #fff;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links {
  display: flex;
  gap: 25px;
}

.nav-links a {
  text-decoration: none;
  color: #444;
}


.hero {
  text-align: center;
  padding: 120px 20px;
  background: #eef2f7;
}

.hero h1 {
  font-size: 2.5rem;
}

.team {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  margin: auto;
  justify-content: center;
}

.card {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.3s;

  flex: 1 1 100%;
  max-width: 300px;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin-bottom: 15px;
}


footer {
            background-color: #111827;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-logo {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .footer-copy {
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .footer-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }


@media (min-width: 600px) {
  .card {
    flex: 1 1 45%;
  }
}


@media (min-width: 900px) {
  .card {
    flex: 1 1 22%;
  }

  .hero h1 {
    font-size: 3rem;
  }
}


@media (max-width: 500px) {
  .nav-links {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;  
  }

  nav {
    flex-direction: column;
    align-items: flex-start;
  }

  .footer-links {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;  
  }

  footer {
    flex-direction: column;
    align-items: flex-start;
  }


}
</style>
</head>

<body>

<nav>
  <div class="logo">Visionary</div>

  <div class="nav-links" id="navLinks">
    <a href="#">Home</a>
    <a href="#">Team</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Building the future together</h1>
</section>

<section class="team">
  <h2>Meet Our Team</h2>

  <div class="cards">
    <div class="card">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
      <h3>Alex Johnson</h3>
      <p>CEO</p>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <h3>Sarah Williams</h3>
      <p>CTO</p>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/men/65.jpg">
      <h3>Michael Chen</h3>
      <p>Designer</p>
    </div>

    <div class="card">
      <img src="https://randomuser.me/api/portraits/women/68.jpg">
      <h3>Emily Davis</h3>
      <p>Product Head</p>
    </div>
  </div>
</section>

<footer>
        <div class="footer-logo">Visionary</div>
        <div class="footer-copy">&copy; 2026 Visionary Inc. All rights reserved.</div>
        <ul class="footer-links">
            <li><a href="#">Twitter</a></li>
            <li><a href="#">LinkedIn</a></li>
            <li><a href="#">GitHub</a></li>
        </ul>
</footer>

</body>
</html>
